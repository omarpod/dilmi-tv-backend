{% extends "admin/base.html" %}
{% load static %}

<!--
    base_site.html: نقطة التمديد الرسمية من Django لتخصيص الشعار وربط
    CSS مخصص (راجع ADMIN_REBUILD_NOTES.md للشرح الكامل). يُمدِّد
    admin/base.html مباشرة (وليس admin/index.html)، فلا يوجد أي خطر
    "تمديد ذاتي" هنا إطلاقاً.
-->

{% block title %}{{ title }} | Dilmi TV{% endblock %}

{% block branding %}
<h1 id="site-name">
    <a href="{% url 'admin:index' %}">
        Dilmi TV <span style="opacity:.65; font-weight:300; font-size:.8em;">إدارة</span>
    </a>
</h1>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<link rel="stylesheet" href="{% static 'admin/css/admin_custom.css' %}">
{% endblock %}

{% block extrahead %}
{{ block.super }}
<link rel="icon" type="image/png" href="{% static 'images/site_logo.png' %}">
{% endblock %}
